name: CI Pipeline

on: [push, pull_request]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout cod
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          cd backend
          python -m venv ../.venv
          ../.venv/bin/pip install -r dev-requirements.txt

      - name: Compile syntax
        run: |
          cd backend
          ../.venv/bin/python -m compileall .

      - name: Lint (Ruff)
        run: |
          cd backend
          ../.venv/bin/ruff check .

      - name: Test & Coverage
        run: |
          cd backend
          ../.venv/bin/pytest --cov=app --cov-fail-under=75

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/.coverage

      - name: Smoke Test (Boot & cURL)
        run: |
          cd backend
          ../.venv/bin/python -m app &
          sleep 5
          curl --fail http://127.0.0.1:8000/health

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout cod
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install & Verificari
        run: |
          cd frontend
          npm ci
          npm run lint
          npm run typecheck
          npm run test
          npm run build

