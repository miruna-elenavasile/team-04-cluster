name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # --- TRACK-UL PENTRU BACKEND ---
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python scripts/dev.py setup || pip install -r requirements.txt || pip install ruff pytest pytest-cov

      - name: Ruff Check
        run: ruff check .

      - name: Pytest
        run: pytest --cov=./ --cov-report=xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage.xml

      - name: Python compileall
        run: python -m compileall .

      - name: Boot the app and curl health
        run: |
          python scripts/dev.py run &
          sleep 3
          curl --fail http://localhost:5000/health || curl --fail http://localhost:8000/health

  # --- TRACK-UL PENTRU FRONTEND ---
  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install Frontend Deps
        run: npm ci

      - name: Lint Frontend
        run: npm run lint

      - name: Typecheck Frontend
        run: npm run typecheck

      - name: Run Frontend Tests
        run: npm run test

      - name: Build Frontend
        run: npm run build
